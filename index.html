<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Velocity.dev - Train Like A 10x Developer</title>
    <meta name="description" content="Developer typing and coding fluency platform. Train syntax speed, debugging reflexes, and flow state - built for serious engineers." />
    <meta name="theme-color" content="#111111" />
    <meta property="og:title" content="Velocity.dev | Train Like A 10x Developer" />
    <meta property="og:description" content="Master the mechanics of coding. Improve speed, accuracy, and flow state on the ultimate training platform for engineers." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" />
  </head>
  <body class="bg-[#111111] font-mono">
    <!-- Preloader Overlay -->
    <div id="preloader" class="grid-bg">
      <style>
        #preloader {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: #111111;
          z-index: 99999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          color: #FFC857;
          transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
          /* Start slightly transparent to let preview tools potentially see through if they take multi-frame shots */
          opacity: 1; 
        }
        
        .grid-bg {
          background-image:
            linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
          background-size: 32px 32px;
        }

        .preloader-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 24px;
        }

        .preloader-logo {
          display: flex;
          align-items: center;
          gap: 12px;
          animation: slideUp 0.5s ease-out;
        }

        .preloader-box {
          width: 8px;
          height: 8px;
          background: #FFC857;
          box-shadow: 0 0 20px rgba(255, 200, 87, 0.5);
          animation: rotateBox 2s infinite linear;
        }

        .preloader-text {
          font-size: 14px;
          letter-spacing: 0.4em;
          font-weight: 700;
        }

        .preloader-bar-container {
          width: 200px;
          display: flex;
          flex-direction: column;
          gap: 8px;
          opacity: 0.8;
        }

        .preloader-bar {
          width: 100%;
          height: 1px;
          background: rgba(255, 200, 87, 0.1);
          position: relative;
          overflow: hidden;
        }

        .preloader-progress {
          position: absolute;
          top: 0;
          left: 0;
          height: 100%;
          width: 0%;
          background: #FFC857;
          animation: loadProgress 2s cubic-bezier(0.1, 0.5, 0.1, 1) forwards;
        }

        .preloader-status {
          font-size: 8px;
          letter-spacing: 0.2em;
          opacity: 0.5;
          display: flex;
          justify-content: space-between;
          text-transform: uppercase;
        }

        @keyframes rotateBox {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        @keyframes loadProgress {
          0% { width: 0%; }
          100% { width: 100%; }
        }

        @keyframes slideUp {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        #preloader.fade-out {
          opacity: 0;
          visibility: hidden;
        }

        /* Hero Skeleton Styles - Visible to bots and in previews */
        .hero-skeleton {
          max-width: 1400px;
          margin: 0 auto;
          padding: 80px 24px;
          display: grid;
          grid-template-columns: 1fr;
          gap: 40px;
        }
        @media (min-width: 1024px) {
          .hero-skeleton {
            grid-template-columns: 420px 1fr;
            padding-top: 100px;
          }
        }
        .skeleton-tag { width: 200px; height: 10px; background: rgba(255,255,255,0.05); margin-bottom: 24px; }
        .skeleton-title { width: 100%; max-width: 400px; height: 120px; background: rgba(255,255,255,0.03); margin-bottom: 32px; }
        .skeleton-btn { width: 160px; height: 40px; background: rgba(255,200,87,0.1); display: inline-block; }
        .skeleton-arena { width: 100%; height: 400px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
      </style>
      
      <div class="preloader-content">
        <div class="preloader-logo">
          <div class="preloader-box"></div>
          <div class="preloader-text">VELOCITY.DEV</div>
        </div>
        <div class="preloader-bar-container">
          <div class="preloader-bar">
            <div class="preloader-progress"></div>
          </div>
          <div class="preloader-status">
            <span id="status-text">INITIALIZING...</span>
            <span id="status-percent">0%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Hero Skeleton (Visible under preloader/to bots) -->
    <div id="root">
      <div class="hero-skeleton grid-bg">
        <div class="skeleton-content">
          <div class="skeleton-tag"></div>
          <div class="skeleton-title"></div>
          <div class="skeleton-btn"></div>
        </div>
        <div class="skeleton-arena"></div>
      </div>
    </div>

    <script>
      (function() {
        const preloader = document.getElementById('preloader');
        const statusText = document.getElementById('status-text');
        const statusPercent = document.getElementById('status-percent');
        
        // Skip preloader for bots/previews if possible
        const isBot = /bot|google|baidu|bing|msn|duckduckbot|teoma|slurp|yandex|headless|webdriver/i.test(navigator.userAgent) || window.navigator.webdriver;
        
        if (isBot) {
          preloader.style.display = 'none';
          return;
        }

        const messages = ["INITIALIZING...", "LOADING MODULES...", "BOOTING...", "READY"];
        let progress = 0;
        
        const interval = setInterval(() => {
          progress += Math.random() * 20;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            setTimeout(() => {
              preloader.classList.add('fade-out');
              setTimeout(() => preloader.remove(), 600);
            }, 400);
          }
          
          statusPercent.textContent = Math.floor(progress) + "%";
          const msgIdx = Math.min(Math.floor((progress / 100) * messages.length), messages.length - 1);
          statusText.textContent = messages[msgIdx];
        }, 120);

        // Safety timeout
        setTimeout(() => {
          if (preloader) {
            preloader.classList.add('fade-out');
            setTimeout(() => preloader.remove(), 600);
          }
        }, 4000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
